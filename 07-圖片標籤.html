<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!--
        src 是 <img> 標籤的必須屬性，它用於指定圖像文件的路徑和文件

        屬性介紹
            1. src: 用於指定圖像文件的路徑和文件
            2. alt: 替換文本（當圖片不能顯示時候顯示的文字）
            3. title: 提示文本（鼠標放到圖像上，顯示的文字）
    -->
  <h4>圖像標籤的使用:</h4>
  <img src="./images/img.jpg" /><br>
  <hr>


  <h4> alt 替換文本 圖像顯示不出來的時候用文字替換:</h4>
  <img src="./images/img1.jpg" alt="我是pink老師" /> <br>
  <hr>


  <h4> title 提示文本 鼠標放到圖像上,提示的文字:</h4>
  <img src="./images/img.jpg" title="我是pink老師思密達" /><br>
  <hr>

  <h4> width、height</h4>
  <img src="./images/img.jpg" width="200" height="200" /><br>
  <hr>
</body>

</html>
